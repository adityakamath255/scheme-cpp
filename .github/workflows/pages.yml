name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.1
      - name: Build wasm
        run: |
          emcmake cmake -S web -B web/build
          cmake --build web/build
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Typecheck and compile app.ts
        run: npx -y -p typescript@5.8 tsc -p web/tsconfig.json
      - name: Assemble site
        run: |
          mkdir -p site
          cp web/index.html web/styles.css web/app.js web/build/scheme.js web/build/scheme.wasm site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
