<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>scheme-cpp</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>scheme-cpp</h1>
  <span class="sub">a Scheme interpreter in C++, compiled to WebAssembly</span>
  <span class="spacer"></span>
  <a href="https://github.com/adityakamath255/scheme-cpp">source</a>
</header>

<main>
  <section class="pane" id="left">
    <div class="label">
      program
      <span class="spacer"></span>
      <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run
      <button id="share" class="ghost" disabled>Copy link</button>
      <button id="run" disabled>Run</button>
    </div>
    <textarea id="editor" autocomplete="off" autocapitalize="off" spellcheck="false" disabled></textarea>
  </section>
  <div class="gutter" id="gutter"></div>
  <section class="pane" id="right">
    <div class="label">
      output
      <span class="spacer"></span>
      <span id="timing"></span>
      <button id="reset" class="ghost" disabled>Reset session</button>
    </div>
    <div id="output"><span class="hint">loading&hellip;</span></div>
  </section>
</main>

<script src="scheme.js"></script>
<script src="app.js"></script>
</body>
</html>
